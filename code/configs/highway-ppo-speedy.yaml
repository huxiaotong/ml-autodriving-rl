experiment_name: highway-ppo-speedy
seed: 44

reward:
  version: reward-v003-speedy
  intent: test whether stronger speed reward increases efficiency risk

environment:
  id: highway-v0
  render_mode: null
  config:
    lanes_count: 3
    vehicles_count: 30
    duration: 40
    policy_frequency: 1
    simulation_frequency: 15
    observation:
      type: Kinematics
      vehicles_count: 8
      features:
        - presence
        - x
        - y
        - vx
        - vy
      absolute: false
      normalize: true
    action:
      type: DiscreteMetaAction
    reward_speed_range:
      - 22
      - 32
    collision_reward: -1
    right_lane_reward: 0.05
    high_speed_reward: 0.8
    lane_change_reward: 0

training:
  algorithm: PPO
  total_timesteps: 20000
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 64
  gamma: 0.99
  checkpoint_interval: 10000

evaluation:
  suite_name: eval-suite-v001
  episodes: 20
  deterministic: true
  unsafe_distance_threshold: 8.0
  hard_brake_delta_threshold: 4.0
  gates:
    min_success_rate: 0.8
    max_collision_rate: 0.2
    max_unsafe_distance_rate: 0.25
    max_hard_brake_count_per_100_episodes: 120

